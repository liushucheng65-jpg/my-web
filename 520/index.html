<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小刘的灵魂共振实验室 | 520 限定</title>
    <style>
        :root {
            /* 浪漫微醺调色盘：暗玫瑰红、深夜蓝与极光紫的交织 */
            --bg-gradient: linear-gradient(135deg, #090a0f 0%, #140718 50%, #050b14 100%);
            --text-primary: #f3f4f6;
            --text-secondary: #b3b9c1;
            --accent-pink: #ec4899;
            --accent-purple: #8b5cf6;
            --accent-linear: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
            position: relative;
        }

        /* 微信轻量化优化：用高性能CSS渐变光晕代替Canvas粒子，零延迟 */
        body::before, body::after {
            content: ""; position: absolute; width: 300px; height: 300px; border-radius: 50%; filter: blur(120px); z-index: 1; opacity: 0.3; pointer-events: none;
        }
        body::before { top: -50px; left: -50px; background: var(--accent-pink); }
        body::after { bottom: -50px; right: -50px; background: var(--accent-purple); }

        /* 浪漫玻璃拟态容器 */
        .container {
            position: relative;
            width: 100%; max-width: 380px;
            height: 84vh; max-height: 620px;
            background: rgba(15, 11, 25, 0.65);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(236, 72, 153, 0.1);
            z-index: 10; overflow: hidden;
            padding: 36px 26px;
            display: flex; flex-direction: column;
        }

        /* 极光流体进度条 */
        .progress-container { width: 100%; height: 3px; background: rgba(255, 255, 255, 0.03); position: absolute; top: 0; left: 0; }
        .progress-bar { height: 100%; width: 0%; background: var(--accent-linear); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px var(--accent-pink); }

        .scene {
            position: absolute; top: 36px; left: 26px; right: 26px; bottom: 36px;
            opacity: 0; pointer-events: none; transform: scale(0.96) translateY(10px);
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .scene.active { opacity: 1; pointer-events: auto; transform: scale(1) translateY(0); }

        h1 {
            font-size: 24px; font-weight: 600; letter-spacing: 2px; line-height: 1.5; margin-bottom: 16px;
            background: linear-gradient(135deg, #ffffff 30%, #f472b6 70%, #a78bfa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        p.description { font-size: 13.5px; color: var(--text-secondary); line-height: 1.7; letter-spacing: 0.5px; }

        /* 流光浪漫按钮 */
        .btn-primary {
            background: var(--accent-linear); color: #fff; border: none; padding: 15px; border-radius: 16px;
            font-size: 15px; font-weight: 500; letter-spacing: 1px; cursor: pointer; width: 100%; text-align: center;
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.3); transition: all 0.3s ease;
        }
        .btn-primary:active { transform: scale(0.97); opacity: 0.9; }

        .options-group { display: flex; flex-direction: column; gap: 14px; margin: auto 0; }

        /* 浪漫卡片式选项 */
        .option-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 16px 18px; border-radius: 14px;
            cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); font-size: 13.5px; line-height: 1.6;
        }
        .option-card:hover, .option-card:active {
            background: rgba(236, 72, 153, 0.08); border-color: rgba(236, 72, 153, 0.4);
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.1); transform: translateY(-1px);
        }

        .score-display {
            font-size: 64px; font-weight: 700; text-align: center; margin: 15px 0;
            background: linear-gradient(135deg, #f472b6 0%, #c084fc 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: float 3s ease-in-out infinite alternate;
        }
        @keyframes float { 0% { transform: translateY(0); } 100% { transform: translateY(-6px); } }

        /* 弹窗设计 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 4, 9, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            z-index: 100; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: rgba(20, 15, 30, 0.9); border: 1px solid rgba(236, 72, 153, 0.15);
            width: 85%; max-width: 320px; padding: 28px; border-radius: 24px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .heart { position: absolute; font-size: 22px; pointer-events: none; z-index: 99; animation: fly 1.2s forwards ease-out; }
        @keyframes fly { 0% { transform: translate(0, 0) scale(1.2); opacity: 1; } 100% { transform: translate(var(--x), var(--y)) scale(0.4); opacity: 0; } }
    </style>
</head>
<body>

    <audio id="bg-music" src="https://assets.mixkit.co/active_storage/sfx/123/123.wav" loop preload="auto"></audio>

    <div class="container">
        <div class="progress-container"><div class="progress-bar" id="progress"></div></div>

        <section id="scene-welcome" class="scene active">
            <div style="margin-top: 15px;">
                <p
