<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 灵感探索工坊 | 实时课堂互动社区(Supabase版)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-natural: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 50%, #eef2f6 100%);
            --primary-mint: #10b981;
            --primary-hover: #059669;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(16, 185, 129, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg-natural); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 20px 10px; }
        .wrapper { width: 100%; max-width: 800px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 24px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 10px 30px rgba(16, 185, 129, 0.05); padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        header { text-align: center; border-bottom: 1px dashed var(--card-border); padding-bottom: 15px; }
        header h1 { font-size: 24px; color: var(--primary-mint); letter-spacing: 1px; }
        header p { font-size: 13px; color: var(--text-muted); margin-top: 5px; }

        #login-view { text-align: center; padding: 40px 10px; }
        .input-styled { padding: 12px 16px; border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 12px; font-size: 15px; width: 100%; max-width: 260px; outline: none; text-align: center; }
        .input-styled:focus { border-color: var(--primary-mint); }
        .btn { background: var(--primary-mint); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-size: 15px; cursor: pointer; font-weight: 500; }
        .btn:hover { background: var(--primary-hover); }

        #main-content { display: none; flex-direction: column; gap: 24px; }
        .fortune-box { background: linear-gradient(135deg, #ffffff 0%, #f0fdf4 100%); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 16px; padding: 20px; text-align: center; }
        #fortune-result { margin-top: 12px; font-size: 15px; font-weight: 600; line-height: 1.6; padding: 12px; border-radius: 8px; display: none; }
        .gold-tag { background: rgba(245, 158, 11, 0.1); color: #d97706; border: 1px dashed #f59e0b; }
        .normal-tag { background: rgba(16, 185, 129, 0.05); color: #065f46; }

        .chat-section { display: flex; flex-direction: column; gap: 16px; }
        .post-box { display: flex; flex-direction: column; gap: 12px; background: #fff; padding: 16px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.05); }
        textarea { width: 100%; height: 80px; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; font-size: 14px; resize: none; outline: none; }
        
        .media-upload-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .file-label { background: #f3f4f6; color: var(--text-main); padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid #e5e7eb; }
        input[type="file"] { display: none; }

        .message-feed { display: flex; flex-direction: column; gap: 16px; max-height: 500px; overflow-y: auto; padding-right: 5px; }
        .msg-card { background: #fff; padding: 16px; border-radius: 16px; border-left: 4px solid var(--primary-mint); box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .msg-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
        .msg-user { font-weight: 600; color: #374151; }
        .msg-text { font-size: 14px; line-height: 1.6; white-space: pre-wrap; margin-bottom: 8px; }
        .msg-media img, .msg-media video { max-width: 100%; max-height: 240px; border-radius: 8px; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>AI 灵感探索工坊</h1>
            <p>用创意链接世界，用灵感点亮课堂</p>
        </header>

        <div id="login-view">
            <p style="margin-bottom: 15px; font-size: 14px; color: var(--text-muted);" id="login-tip">请输入你的探索者昵称以加入互动：</p>
            <input type="text" id="username" class="input-styled" placeholder="老师叫我小刘就好了" maxlength="12"><br><br>
            <button class="btn" onclick="enterWorkspace()">进入互动空间</button>
        </div>

        <div id="main-content">
            <div class="fortune-box">
                <p style="font-size: 14px; font-weight: 500;">🔮 AI 灵感今日运势</p>
                <button class="btn" id="draw-btn" onclick="drawLottery()" style="padding: 8px 18px; font-size: 13px; margin-top: 10px;">抽取今日灵感签</button>
                <div id="fortune-result"></div>
            </div>

            <div class="chat-section">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="font-size: 16px; color: #374151;" id="welcome-title">💬 课堂灵感看板</h3>
                    <button class="btn" onclick="loadMessagesFromSupabase()" style="padding: 6px 14px; font-size: 12px; background:#e0f2fe; color:#0369a1;">🔄 手动刷新看板</button>
                </div>
                <div class="post-box">
                    <textarea id="post-text" placeholder="在这里输入你想分享的AI想法、Prompt..."></textarea>
                    <div class="media-upload-bar">
                        <label class="file-label">🖼️ 上传图片 <input type="file" id="upload-image" accept="image/*" onchange="handleFileSelect(event, 'image')"></label>
                        <label class="file-label">🎬 上传视频 <input type="file" id="upload-video" accept="video/*" onchange="handleFileSelect(event, 'video')"></label>
                        <span id="file-status" style="font-size: 12px; color: var(--primary-mint);"></span>
                        <button class="btn" id="submit-btn" onclick="submitPost()" style="margin-left: auto; padding: 8px 20px; font-size: 14px;">发布分享</button>
                    </div>
                </div>
                <div class="message-feed" id="message-feed"></div>
            </div>
        </div>
    </div>

    <script>
        // 🔒 填空区：在这里填入你在 Supabase API 面板拿到的两个核心凭证
        const SUPABASE_URL = "https://oueoeobuzhrpjkyaagjz.supabase.co/rest/v1/"; 
        const SUPABASE_ANON_KEY = "sb_publishable_LgPOIE6Fc4OV7ZEsNAdrNQ_1HPhusK-";

        let supabaseClient = null;

        // 初始化驱动验证
        if(SUPABASE_URL !== "https://oueoeobuzhrpjkyaagjz.supabase.co/rest/v1/") {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } else {
            alert("⚠️ 小刘老师，别忘了在代码第 81-82 行配置你的 Supabase 数据库密钥哦！");
        }

        let currentUser = "";
        let currentAttachedMedia = { type: null, data: null };

        const fortunePool = [
            "【大吉】提示词直击灵魂！今日AI生成的图片毫无瑕疵，逻辑完美闭环。",
            "【中吉】算力爆棚。今日非常适合调试Agent，代码生成一气呵成。",
            "自由灵感涌现。适合天马行空地胡思乱想，AI会完美接住你的脑洞。",
            "【平签】运行稳定。今日无Bug也无惊喜，适合沉淀基础，多喝几杯东方墨兰。",
            "【整活签】服务器微醺。今日Prompt可能会跑偏，但会收获意想不到的搞笑成果。"
        ];

        window.onload = function() {
            const savedUser = localStorage.getItem('bound_device_user');
            if (savedUser) {
                document.getElementById('username').value = savedUser;
                document.getElementById('username').disabled = true;
                document.getElementById('login-tip').innerHTML = `✨ 已绑定设备：<strong style="color:var(--primary-mint);">@${savedUser}</strong>`;
            }
        }

        function enterWorkspace() {
            let nameInput = document.getElementById('username').value.trim();
            if(!nameInput) { alert("请输入昵称！"); return; }
            
            const savedUser = localStorage.getItem('bound_device_user');
            if (!savedUser) {
                localStorage.setItem('bound_device_user', nameInput);
                currentUser = nameInput;
            } else {
                currentUser = savedUser;
            }
            
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('welcome-title').innerText = `💬 课堂看板 (@${currentUser})`;
            
            loadMessagesFromSupabase();
            checkFortuneStatus();

            // 🕰️ 心跳检测：每隔 5 秒，系统自动去云端拉取全班最新消息
            setInterval(loadMessagesFromSupabase, 5000);
        }

        function checkFortuneStatus() {
            const lastDrawDate = localStorage.getItem(`fortune_date_${currentUser}`);
            const today = new Date().toDateString();
            if (lastDrawDate === today) {
                const savedFortune = localStorage.getItem(`fortune_res_${currentUser}`);
                showFortuneResult(savedFortune, true);
            }
        }

        function drawLottery() {
            const today = new Date().toDateString();
            let finalFortune = "";
            const luckyRoll = Math.random() * 100;
            if (luckyRoll <= 5) {
                finalFortune = "✨【金色传说·锦鲤签】恭喜你触发了5%的隐藏欧皇概率！今日灵感无限，请凭此屏幕截图，下课后速去找小刘老师领取你的幸运专属奖品！🎁";
            } else {
                finalFortune = fortunePool[Math.floor(Math.random() * fortunePool.length)];
            }
            localStorage.setItem(`fortune_date_${currentUser}`, today);
            localStorage.setItem(`fortune_res_${currentUser}`, finalFortune);
            showFortuneResult(finalFortune, false);
        }

        function showFortuneResult(text, isCached) {
            const resDiv = document.getElementById('fortune-result');
            const btn = document.getElementById('draw-btn');
            resDiv.innerText = text + (isCached ? " (今天你已经抽过签啦)" : "");
            resDiv.style.display = 'block'; btn.style.display = 'none';
            resDiv.className = text.includes("金色传说") ? "gold-tag" : "normal-tag";
        }

        function handleFileSelect(event, type) {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) { alert("为了保证全班同步秒开，图片/视频请压缩到 2MB 以内哦！"); return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                currentAttachedMedia = { type: type, data: e.target.result };
                document.getElementById('file-status').innerText = `已暂存${type === 'image' ? '图片' : '视频'}`;
            };
            reader.readAsDataURL(file);
        }

        // 🚀 发送消息到 Supabase 云端
        async function submitPost() {
            const text = document.getElementById('post-text').value.trim();
            if (!text && !currentAttachedMedia.data) return;

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.innerText = "正在传输云端...";
            submitBtn.disabled = true;

            const { data, error } = await supabaseClient
                .from('classroom_feed')
                .insert([
                    { 
                        username: currentUser, 
                        content: text, 
                        media_type: currentAttachedMedia.type, 
                        media_data: currentAttachedMedia.data 
                    }
                ]);

            if (error) {
                alert("云端同步失败，请检查网络或配置");
                console.error(error);
            } else {
                document.getElementById('post-text').value = "";
                currentAttachedMedia = { type: null, data: null };
                document.getElementById('file-status').innerText = "";
                loadMessagesFromSupabase();
            }
            submitBtn.innerText = "发布分享";
            submitBtn.disabled = false;
        }

        // 🔄 从 Supabase 云端抓取最新消息
        async function loadMessagesFromSupabase() {
            if (!supabaseClient) return;
            
            const { data: posts, error } = await supabaseClient
                .from('classroom_feed')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(40);

            if (error) {
                console.error("数据拉取失败:", error);
                return;
            }

            const feed = document.getElementById('message-feed');
            feed.innerHTML = '';

            if(!posts || posts.length === 0) {
                feed.innerHTML = `<p style="text-align:center; color:var(--text-muted); font-size:13px; margin-top:20px;">云端看板空空如也，快让同学们发布第一条灵感吧！</p>`;
                return;
            }

            posts.forEach(item => {
                const card = document.createElement('div');
                card.className = 'msg-card';
                
                const user = item.username;
                const text = item.content;
                const mediaType = item.media_type;
                const mediaData = item.media_data;
                const time = new Date(item.created_at).toLocaleString();

                let mediaHtml = "";
                if (mediaData) {
                    if (mediaType === 'image') {
                        mediaHtml = `<div class="msg-media"><img src="${mediaData}"></div>`;
                    } else if (mediaType === 'video') {
                        mediaHtml = `<div class="msg-media"><video src="${mediaData}" controls></video></div>`;
                    }
                }

                card.innerHTML = `
                    <div class="msg-meta">
                        <span class="msg-user">@${user}</span>
                        <span>${time}</span>
                    </div>
                    ${text ? `<div class="msg-text">${text}</div>` : ''}
                    ${mediaHtml}
                `;
                feed.appendChild(card);
            });
        }
    </script>
</body>
</html>
